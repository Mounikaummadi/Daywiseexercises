<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }
    .quiz-container {
      background: white;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .option {
      display: block;
      margin: 10px 0;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #eee;
    }
    .option:hover { background: #ddd; }
    #feedback { font-weight: bold; margin: 15px 0; }
    button { padding: 10px 20px; border-radius: 5px; background: #333; color: white; border: none; cursor: pointer; }
    button:hover { background: #555; }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question"></h2>
  <div id="options"></div>
  <p id="feedback"></p>
  <button onclick="nextQuestion()">Next Question</button>
  <p>Score: <span id="score">0</span></p>
</div>

<script src="script17.js" defer></script>
</body>
</html>

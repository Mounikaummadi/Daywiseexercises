<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Form Validation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .error {
      color: red;
      font-size: 13px;
      visibility: hidden;
      margin-left: 8px;
    }
    input {
      padding: 6px;
      width: 220px;
    }
    button {
      padding: 6px 12px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Login Form</h2>

<div class="form-group">
  <label>Email:</label>
  <input type="text" id="email" onblur="validateEmail()">
  <span id="emailError" class="error">Email is required</span>
</div>

<div class="form-group">
  <label>Password:</label>
  <input type="password" id="password" onblur="validatePassword()">
  <span id="passwordError" class="error">Password is required</span>
</div>

<button onclick="validateLogin()">Login</button>

<script src="login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Exercise 3 - Input Length</title>
</head>
<body>

<input type="text" id="myInput" placeholder="Type something here">
<button onclick="printLength()">Check Length</button>

<p id="output"></p>

<script>
  function printLength() {
    let text = document.getElementById('myInput').value;
    let len = text.length;  
    document.getElementById('output').textContent = "Length: " + len;
  }
</script>

</body>
</html>
